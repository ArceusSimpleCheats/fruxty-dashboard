<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUXTY - Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a, #1a0f05);
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #FF6B35;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { background: linear-gradient(135deg, #FF6B35, #F7931E); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        button {
            background: #5865F2;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🤖</div>
        <h1>FRUXTY</h1>
        <p>Advanced Server Management</p>
        <button id="loginBtn">Login with Discord</button>
    </div>
    <script>
        const RENDER_URL = 'https://fruxty.onrender.com';
        const CLIENT_ID = '1503755260814954577';

        // If already logged in, go to dashboard
        const token = localStorage.getItem('fruxty_token');
        if (token) {
            window.location.href = '/dashboard';
        }

        document.getElementById('loginBtn').onclick = () => {
            window.location.href = `${RENDER_URL}/auth/discord`;
        };
    </script>
</body>
</html>
