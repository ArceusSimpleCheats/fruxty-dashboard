<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruxty Bot - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0f05 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container { text-align: center; }
        .login-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            border: 2px solid #FF6B35;
            box-shadow: 0 0 50px rgba(255, 107, 53, 0.2);
        }
        .bot-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 20px;
        }
        h1 { 
            font-size: 36px;
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        p { color: #ccc; margin-bottom: 30px; }
        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #5865F2;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 16px;
        }
        .discord-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(88, 101, 242, 0.4);
        }
        .features {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .feature {
            color: #FF6B35;
            font-size: 13px;
            background: rgba(255, 107, 53, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
        }
        .error-msg {
            color: #ff6666;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="bot-icon">🤖</div>
            <h1>Fruxty Bot</h1>
            <p>Advanced Server Management Dashboard</p>
            <a href="#" onclick="login()" class="discord-btn" id="loginBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M20.317 4.3698a19.7913 19.7913 0 0 0-4.8851-1.5152.0741.0741 0 0 0-.0785.0371c-.2102.3733-.4443.8645-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1639-.385-.4074-.8762-.6178-1.2495a.077.077 0 0 0-.0785-.037 19.7363 19.7363 0 0 0-4.8852 1.515.0699.0699 0 0 0-.0321.0277C.5334 8.0458-.319 13.5799.0992 18.0578a.0824.0824 0 0 0 .0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 0 0 .0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 0 0-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 0 1-.0076-.1275c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 0 1 .0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 0 1 .0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 0 1-.0066.1276 12.2986 12.2986 0 0 1-1.873.8918.0766.0766 0 0 0-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 0 0 .0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 0 0 .0313-.0552c.5004-5.177-.8387-10.6739-3.5485-15.2276a.0722.0722 0 0 0-.0312-.0277zM8.5204 15.2453c-1.2203 0-2.2263-1.1186-2.2263-2.4866 0-1.368.9825-2.4865 2.2263-2.4865 1.252 0 2.2498 1.1186 2.2263 2.4865 0 1.368-.9743 2.4866-2.2263 2.4866zm6.9592 0c-1.2203 0-2.2263-1.1186-2.2263-2.4866 0-1.368.9825-2.4865 2.2263-2.4865 1.252 0 2.2498 1.1186 2.2263 2.4865 0 1.368-.9743 2.4866-2.2263 2.4866z"/>
                </svg>
                Login with Discord
            </a>
            <div class="features">
                <span class="feature">🛡️ AutoMod</span>
                <span class="feature">🎤 Temp Voice</span>
                <span class="feature">📈 Leveling</span>
                <span class="feature">🎁 Giveaways</span>
            </div>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
    <script>
        const CLIENT_ID = '1503755260814954577';
        const REDIRECT_URI = encodeURIComponent('https://fruxty-dashboard.vercel.app/dashboard');
        const BOT_API_URL = 'https://fruxty.onrender.com';
        
        function login() {
            const scope = 'identify guilds';
            const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=${scope}`;
            window.location.href = authUrl;
        }
        
        // Handle the redirect back from Discord
        if (window.location.hash && window.location.hash.includes('access_token')) {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const token = params.get('access_token');
            if (token) {
                localStorage.setItem('discord_token', token);
                window.location.href = '/dashboard.html';
            }
        }
        
        // Check if already logged in
        const token = localStorage.getItem('discord_token');
        if (token && window.location.pathname !== '/dashboard.html') {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
