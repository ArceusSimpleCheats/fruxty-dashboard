<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUXTY - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0f05 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 24px;
            border: 2px solid #FF6B35;
            text-align: center;
        }
        .bot-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 20px;
        }
        h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .discord-btn {
            background: #5865F2;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="bot-icon">🤖</div>
        <h1>FRUXTY</h1>
        <p>Advanced Server Management</p>
        <button class="discord-btn" onclick="login()">Login with Discord</button>
    </div>

    <script>
        const CLIENT_ID = '1503755260814954577';
        const REDIRECT_URI = encodeURIComponent('https://fruxty-dashboard.vercel.app/dashboard');
        
        // --- IMPORTANT: Check if we're returning from Discord ---
        // Discord adds the token as a URL fragment like #access_token=...
        if (window.location.hash && window.location.hash.includes('access_token')) {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = hashParams.get('access_token');
            if (accessToken) {
                // Save token to localStorage (no expiry, just store it)
                localStorage.setItem('fruxty_token', accessToken);
                // Redirect to clean dashboard URL (without the hash)
                window.location.href = '/dashboard';
            }
        }
        
        // If already have a token, go to dashboard directly
        const existingToken = localStorage.getItem('fruxty_token');
        if (existingToken) {
            window.location.href = '/dashboard';
        }
        
        function login() {
            const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify%20guilds`;
            window.location.href = authUrl;
        }
    </script>
</body>
</html>
