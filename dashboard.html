<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruxty Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">🤖 Fruxty</div>
            <nav class="nav">
                <a href="#" class="nav-item active" data-page="overview">📊 Overview</a>
                <a href="#" class="nav-item" data-page="servers">🖥️ My Servers</a>
                <a href="#" class="nav-item" data-page="automod">🛡️ AutoMod</a>
                <a href="#" class="nav-item" data-page="voice">🎤 Temp Voice</a>
                <a href="#" class="nav-item" data-page="commands">📋 Commands</a>
            </nav>
            <div class="user-section">
                <img id="userAvatar" class="user-avatar" src="" alt="">
                <div class="user-info">
                    <div id="userName" class="user-name">Loading...</div>
                    <div id="userDiscrim" class="user-discrim"></div>
                </div>
                <button onclick="logout()" class="logout-btn">🚪 Logout</button>
            </div>
        </aside>

        <main class="main">
            <div id="overview" class="page active">
                <h1>Dashboard Overview</h1>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="botStatus">🟢 Online</div><div class="stat-label">Bot Status</div></div>
                    <div class="stat-card"><div class="stat-value" id="serverCount">0</div><div class="stat-label">Servers</div></div>
                    <div class="stat-card"><div class="stat-value" id="botPing">0ms</div><div class="stat-label">Ping</div></div>
                </div>
                <div class="quick-actions">
                    <button onclick="refreshData()" class="action-btn">🔄 Refresh</button>
                </div>
            </div>

            <div id="servers" class="page">
                <h1>My Servers</h1>
                <div id="serverList" class="server-grid">Loading...</div>
            </div>

            <div id="automod" class="page">
                <h1>AutoMod</h1>
                <div id="automodWarning" class="warning-banner">Select a server first</div>
                <div id="automodSettings" style="display:none">
                    <select id="automodEnabled"><option value="true">Enabled</option><option value="false">Disabled</option></select>
                    <button onclick="saveAutoMod()" class="save-btn">Save</button>
                </div>
            </div>

            <div id="voice" class="page">
                <h1>Temp Voice</h1>
                <div id="voiceWarning" class="warning-banner">Select a server first</div>
                <button onclick="setupVoice()" class="save-btn">Setup Voice</button>
            </div>

            <div id="commands" class="page">
                <h1>Commands</h1>
                <div class="commands-grid" id="commandsList"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
                                                                                             </html>
